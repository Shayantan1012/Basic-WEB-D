<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:slnt,wght@2,100..1000&family=Arima:wght@100..700&family=Inconsolata:wght@200..900&family=Merienda:wght@300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playwrite+DE+Grund:wght@100..400&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ysabeau+SC:wght@1..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container1 arima-font">
        <div class="container2">
            <form class="arima-font">
                <label for = "inputText" class="arima-font">Enter text:</label>
                <input type = "text" class="arima-font" id = "inputText" oninput="countCharacters()">
            </form>
            <p id = "charCount" class="arima-font">Characters typed: </p>
        </div>
    </div>


    <script src = "script.js"></script>
</body>
</html>
